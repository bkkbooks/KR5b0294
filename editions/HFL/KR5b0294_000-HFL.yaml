front:
  text: 太上赤文洞神三籙五十一
  hash: sha256:1aa51e1c274562daaf10bb4adb1078a367d005f79519467e406f2fdb7bbdd762
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0294_HFL_000-001a, image: hfl/0324/0324-094.png}
body:
  text: 梁貞白先生集唐太史令李淳風注隱居先生曰籙者本曰赤文洞神式别出爲三本此書於葛鮑未題有所受人漢中曰吾今以衆所傳者證之爲一篇而遂題本稱於于前故具名衆也中有兩字訛兩存之予在里村時有好事郭君喻示于余此本青廉泥丹書齊梁時字也古朴而符篆精妙未有歳載之題而不詳時代曽授與故人道士張喬張喬云試之大驗余爲故人惜心豈徒然也因爲校之于前貞觀六年歳在壬子辰月序三籙篇上周易内文三甲處談周易内文具八極聖祖名上字妙行符昔伏義傳與神農神農傳由知五穀之播種辨別百藥之良得濟生民後籙圖得之爲顓師周公得之以明易道太公得之以隂謀佐武成王滅紂孔子得之遂洞幽微以讃易道此文古本如之法出户中堯未必知傳授者崇之其後管夷吾孫臏等皆相傳范蠡張良亦爾又曰臏是白龜之精位相禀榮武之氣元有此句未詳揚誓方仲論上官弼此皆元本有之驗其人未之見其法曰神人言曰太平經稱神人眞人毎日持誦呪不忌一切諸物俱誦呪四十九日其神自來廳宫聽宮者耳邊是也道說一切人間萬事也所報耳邊善惡吉凶莫不預言若闘戰強弱勝敗存亡或被盜不知主者若捕捉奴婢迯叛人來之意若何所向之方求謀利益干貴進榮凡百所爲舉無漏也更進未知其成否也但存神即至也天下大事國家休祥利禄名位千載已前未來之事皆通曉也誦呪滿十萬徧若問其事即得其兩神身着道服令人心語笑問之一一皆語若心欲所求先誦呪七徧其神便來廳宫前其人來意一一預知其神一箇着緑衣在左耳報事一箇紫羅衣在右耳邊報事其神常隨人行但問急意便急報急喚急至無不知者也八卦内吉凶應籙呪曰𩲩魅魋𩴃勑熬攝其神乃日月之精冝子丑隂陽日使之但取六甲頭日朱書此符燒灰以清水調之誦前呪二百二十徧以符灰水入兩耳目鼻及口各七點之餘者服之訖再書此符依前呪誦四十九徧然後帶之即見神驗呼遣差此指揮罡若遣報起罡六十日却值六甲子日焼灰㸃之即書符帯之周而復始至心存想不住焼香無不神效焚香度符念呪七徧呪曰願豆爐共李鬼要千虚萬聖合通天地戸此呪祭時以念呪七徧毎遇甲子日爲首却甲子日受符至滿六十甲子並用鹿脯羊肝食祭之如無鹿脯以羊脯代之祭後祭物自食此法不可輕泄秘之東方震符其神青衣頭帶青冠如女子之形若有疑問告人吉凶天日未出時以井花水向震地服符五道東方艮符其神黒衣冠以井花水卯時向艮地服符五道神人對面言語此符大驗東方巽符其神青頭冠如女子之形大小同服令東巽來告人吉凶用井花水服符五道向巽地服自然心開意悟南方離符其神赤衣如女子之形精心修持其神自來言語卯時向離地以井水服符五道西北乾符其神黒衣如男子之形卯時向乾地服符五道以井花水服下其神便來西南坤符其神黄衣冠如老母之形卯時向坤用井花水服之符三道其神自來共語大有神驗西北兌符其神白衣冠如女子之形能知吉凶日月追逃亡遣盗溺死兵死虎狼死目明耳聽先知名字用井花水向兌服符五道北方坎符其神着黒衣卯時向北方以井花水吞符五道即得神通精爽靈驗矣凡修持逢七七日夜面北焚香點七星燈禮拜合念前呪二徧二七日至七七日任意使皆如念不用書讀之請勿傳下士其行時切要堅心淨意䖍誠如輕弗散怠慢者堕七祖及自身祖師入夜夢遊諸境玉女迷魂法第一試法門令小兒睡先念呪二曰不動尊聖攝以黑紙上疊了令小孩兒口咬之二帛蒙頭先取睡卧二口氣念呪曰追四大神將勾迷魂玉女念畢吹睡小兒口内以兩手大拇指去睡人三思臺上分捻又其人自睡又取五方氣吹在身上如二椀茶間自端坐念不動尊聖攝去㝷之見了再念追四大神將勾玉女迷魂吾喚速來歸喚小名起來第二去家夢呪曰唵比唎庠去攝第三去遣人夢呪曰擒倫叱殺卑攝第四過河筏夢呪曰雲應感通護法攝第五觀山境夢呪曰叱威武大將勑煞攝第六入隂人夢呪曰勾四大神將勾府命閉氣攝第七入陽人夢呪曰牒勾神將摳攝第八令人遊雲夢呪曰九天蓬變大將魂攝第九令人遊家夢呪曰護身主人二神不逺攝第十令人洗眼見鬼神夢曰勾神遣鬼參差攝第十一令人遊九霄夢曰開通力士傳神攝第十二一切去者隨意夢曰熬神受受玉女還魂夢攝右書符念呪潔浄宻室内集神西北端坐想北斗七星覆頂上玄武現龜蛇入口内不岀氣書了吹在紙上用新筆朱砂書之如與人仍於呪上任意別書符二道蓋之至夜香上度過燈上燒灰香水吞下自身獨寐而可應凡授逢七日夜焚香點七星燈禮拜各念呪二徧加至七七日任意使用如背念得甚秘行持切要堅心如有輕慢弗應也太上玄妙通神籙直頭法右以五方印朱書燒灰下在温水内念五方呪及天地諸聖呪畢水洗頭目直𧻞影法右用浄紙五張下五方印按在身上念五方呪及諸聖呪念水呪結水印月影中𧻞十歩無影把火燒鎻法左手結火印右手結木印先念木呪後念火呪右手小指地上書火字右手掐火印其鎻自開扶月明法右用五方印安考老内夜至二更将考老岀門行十步側考老裹念五方呪及諸聖呪後取五方印考老挾入房内傾下滿屋皆明也起身法右五方印帖在兩脚心念諸聖呪結五方印自覺身輕隨風便起可髙百尺渡津法凡遇河津用土印安在脚心下念土呪及諸聖呪便入水中如行大路其水不覺便過了慧眼法右五方印燈上燒灰用井花水二斗二升灰水内左手結火印念諸聖呪并火呪右手攪水三匣用水洗眼目見影界隱身法右用五方印按在身上或於頭上念諸聖呪入衆人内令人皆不見或覷財物不得貪心縮地法右五方印安在脚心上念諸聖呪日行千里眞浄法右用五方印燒灰用東流水服之念諸聖呪及五方呪若五七日不闕縮盡永離慾岀神法以八節日朱書五方神印淨香調印燒灰淨室中服之端坐念諸聖呪念木呪結木印出四方東西皆同五假法木假用木印按在身上念諸聖呪及頭上念木呪結木印於林木中與木同體衆人不見謂之木假火假用火印按在身上念諸聖呪念火呪結火印與火無異入火不焦𠋣草木便生煙焰謂之火假金假用金印按在身上念諸聖呪及金呪結金印刀劎不懼避謂之金假水假用水印按在身上念諸聖呪及水呪結水印與水同體不能沉溺謂之水假土假用土印按在身上念諸聖呪及土呪結土印與土同體對目不見謂之土假屍假法右以五方印掐定燒灰香水調服七日每日早晨念諸聖呪七七徧念五方神呪結五方神印第七日便死或死十年不礙五方圓光法用五方印燒灰調服之毎月二日早晨日未岀時念諸聖呪及五方神呪結五方印口中出五色圓光察未來之事一切類用紙便活法以五方印用香面焙乾後剪刀鉸爲諸物形狀念五方神呪及諸聖呪及水印燒灰井花水一升念水呪結水印用水洒之諸物隨水變化大禁焉耳臘月開花法以杏桃樹火印水印用新汲水二斗二升澆樹念水火土呪應時開花種麥法用小麥一升地長闊五十歩作畦子以五方印燒灰井花水二升念諸聖呪及五方神呪各念七徧水浸麥子毎月八日酉時種下戌時生苗寅時用五方神印澆徧至辰時又澆巳時秀穗午時黄熟收之得麥五升五合念火呪訖服之十日不思量早食可以延年此是絶食之法種栗法用粟米半升地長闊五十二歩木印燒灰井花水調澆至申酉時苗生戌時秀子時收淨室中打候子乾二日半升煎粥食令人不老求雨法以五方印埋於地上念諸聖呪及水呪結水印其雨便下霶𩃱要住結火印念火呪即住化風法以土印埋於巽地上念諸聖呪及土呪結土印立便倒樹摧山大風要住結木印念木呪風即止生肉髻法以五方印燒灰香水調服五七日每日念諸聖呪頭生肉髻身似琉璃五十二相便爲異樣之身二符後呪之先叩齒五通多益善呼辦呪之有急又存呼之救助呪水與病人喫風不動水不浸邪魔立起眞元始天尊合受玉皇上帝勑合受玉皇上帝勑老君勑千百祥令呪筆書符法黒殺神王力筆下萬鬼悉呪七徧畢噴上然後書之別書符與病人喫呪水自喫法清清冷冷龍虎成形不飢不渴吾受長生急急如律令勑呪果子與病人法先叩齒七徧呪曰長眞降成萬病不侵急急如律令念呪五徧行持法式夜半子時靜室中用劎二口畫地二丈三尺桑柴灰爲界柳枝四十九莖燈七盞香爐七箇琴二張弓一張箭二隻筆硯二付新氊二領長五尺白粥一椀果子及時着五七箇淨水二椀各依位鋪設了啓請元始天尊乗光降臨於位就座北極大帝乘光下降於位就座東方甲乙歳徳星君南方丙丁熒惑星君西方庚辛太白星君北方壬癸辰星眞君中央戊己鎮星君謹具某家某人年甲姓氏清淨戒於今月某日設壇謹獻上香茶祭物呪曰天得一清地得一寧我得一靈天覆地載日月照我五光助我五星申我急呼急至急急如律令結印法天字印兩手中指端掐大指中節文上地字印兩脚蹉十字木字印兩手大指端掐震宫東方取氣五口火字印兩手大指掐離宫南方取氣三口金字印兩手大指掐兌宫西方取氣二口水字印兩手大指掐坎宫北方取氣二口土字印兩手大指掐中宫取炁五口結印法各張勢然後念呪此是一切聖衆說此偈一一用亊無不應驗矣五方諸聖呪木呪囊謨三滿多没䭾喃揲囉嘢娑嚩賀火呪囊謨三滿多没䭾喃嘢娑嚩賀金呪囊謨三滿多没䭾喃嚩嚕弯嘢娑嚩賀土呪囊謨三滿多沒䭾喃鉢囉鉢尾野娑嚩賀水呪囊謨三滿多没䭾喃吽嘢娑嚩賀右印用龍驚棗木刋印各方二寸二分五方神呪木吒勑東方大金頂自在輪王火吒勑唵南方大金頂自在輪王水吒勑北方大金頂自在輪王金吒勑唵西方大金頂自在輪王土吒勑唵中央大金頂自在輪王如有賢哲者得受傳薄德者殃及九祖及連本身禮敬法從正月初一日二月初二日三月初三日四月初四日五月初五日六月初六日七月初七日八月初八日九月初九日十月初十日十一月十一日十二月十二日右法凡行持之士須擇净室晨夕勤奉香火如遇已上月日皆冝祭祝䖍心敬禮周而復始不可始勤终怠務在精專行之無不應矣其設壇铺陳已述於前太上玄妙千金籙凡用正月一日及七日三月三日五月五日七月七日九月十五日八節日皆一般每遇祭時先喫十二時符便書粥符一道燒灰硯瓦中磨散吹後書符此十二符燒灰爲丸每日早晨水服之如受法時星像同用淨蓆一領如無掃浄地上一般用香燈茶酒各三盞果子等隨意面北書符一都籙符二納眞符三天甲符四地甲符五人甲符六通目符西北焚香謹請太上元皇妙道眞君九天都仙僕射九天使者左青龍右白虎前朱雀後玄武願祈匡濟之恩賜臣所求如意某清齋潔淨焚香澆酒正立躬身謹請北斗眞君紫微夫人東王公西王母河伯兩師十二宫神六甲都𡖖直符使者使臣如意可堪受符又請東方青帝駕於青龍南方赤帝駕於赤龍西方白帝駕於白龍北方黒帝駕於黒龍中央黄帝駕於黃龍五方五帝各降神虛之氣駕五龍各請就位願赴壇領納使臣如意上香再請東方青帝青龍南方赤帝赤龍西方白帝白龍北方黒帝黒龍中央黄帝黃龍各當降神虛之氣入臣身中五星天象正氣入臣身中使臣魂魄萬邪不入諸惡不傷神鬼吾使所昌者昌河伯使官直符眞官乗法治官十二神官上下五甲風伯雨師並降神虚之氣入臣身中道徳通靈當暑無暑當寒無寒飢即得飽危即得安行符神驗急急如律令攝再祝曰謹告諸神酒禮微薄不堪供獻願賜宥之各將本部神願納之再拜訖取酒自飲餘者送東流水中取都籙符三甲符吞之後將納眞符青袋盛之於頭髻中帶之通目符焼灰調水澄清洗眼即得見土神說話耳聞鬼神言語長在人身祭後當送之都籙符第一凡用符光一日朱書符作九子吞之祭法正月七日三月三日五月五日七月七日八月十五日九月九日夜靜星象金書符燒香念呪曰天罡遊歴日月星都符焚氣伏九精度君勑衆符但但但成營衛臣身常爲資帛急急如律令攝納眞符北斗下書此符凡書符先念呪畢朱書符稱名於年月日時呪曰軒轅夫人性好潔淨希於妙道謹行天符攝神收鬼天神祐我地神載我日月照我天神䕶我河伯度我衆邪伏我真神衛我急急如律令攝通目符第三青袋盛之於髻上帶之此符過八節日書之通耳目與鬼神語話朱書焼灰淋水洗眼飲之即時與鬼神說話此符請神後燒如書此符先焚香念呪曰日是我父月是我母五星是我兄吾令攝伏諸鬼神急急如律令天甲符第四天甲符姓清字文公知天上星辰変運往復度數能投星月使人見形如人身家天蛇形如龍脚如牛四足着履此神令人多喜要見神於淨室中香果酒脯子時書符於白素上廣五寸書符青袋盛之於髻之中先念呪日隂陽和合萬事皆從行符使者逐我西東急急如律令地甲符第五地甲符者天下伏尸埋藏財寳物及墳墓並皆知之此神姓濁字武公形如女子身着布衣露頭乗青龍初見人多喜此符朱書唱三聲其神即至呪曰温溫陽陽地柔天剛吾當問請吉凶審詳急急如太上律令人甲符第六人甲符姓金名化形如女人赤青半陽身着赤衣乗赤馬面如人伏縱二人各執牟梨面白一目無鼻能知人家奴婢逃亡甚處又知父子相離多年如問事便知去處朱書此符於頭髻中帯思念神名須臾悉至初祭此符用酒脯已後不用伍符是行病符第七此符是北斗之君使者常廵祭世間有呪詛爲惡逆者與其病人减筭除年但人家卒患瘡瘇眼盲一切病患並是此神治如夢安樂以香茶餅祭之使諸鬼神不敢行病即得安樂此神形如女子着黒衣曲腰持梨乗驢姓専名惡吉又一名惡保此符朱書放患人頭邊立愈如病人再發用墨書之安竈中其人名字於符下火燒亦不發呪曰北君使者當來乗神驢來臨病者釋放病者之罪急急如律令帝策符第八帝策符常使之其神姓劉名可思一樹名常飛行能知人間禍福吉凶玄炒之事身着天衣冠華冠乘雲行能知風雨歳豐時分朱書此符青袋盛之胷前衣襟中自後但有思念神符即至便如親日見問其神言道其吉凶呪曰日是我父月是我母明星是我兄太乙是朋友急急如律令此是九天使者好人長生能學者先書都籙符通日符三甲符然後可書此符爲人所求之事自然成上士剋果上仙飛騰中士成之得爲地仙下士修之得爲地官祿位之職品曠野符右人家忘失墳塜朱書此符亡人名姓符下閉目念呪曰幽幽杳杳吾符訣急急如律令呪畢開眼其鬼即至問墳塜何處其鬼自道此是招神符又名勘合符此符并是華山洞内石壁刻之上令人書之志心謹慎主收一切鬼神朱書如到人家問亊家親并門神并竈神悉來前立道其吉凶皆知姓名住處根因太上赤文洞神三籙
